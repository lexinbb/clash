mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# 核心：拉取私有仓库节点
proxy-providers:
  my-node:
    type: http
    url: "https://raw.githubusercontent.com/lexinbb/clash-private-node/main/node.yaml"
    headers:
      Authorization: token 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
    interval: 3600
    path: ./providers/my-node.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# 修正：直接写死节点名称，不再用 use 字段，完美通过校验
proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - "我的 Hysteria2 东京节点"
      - DIRECT

  - name: "Ghelper"
    type: select
    proxies:
      - "我的 Hysteria2 东京节点"
      - DIRECT

